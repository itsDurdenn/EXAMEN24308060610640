{% extends "Base.html" %} {% block contenido %}
<main class="container w-50 mx-auto">
    <h1 class="text-center">Crea una cuenta</h1>
    <p class="text-center">Es rápido y fácil</p>

    <form method="post" action="{{ url_for('registro') }}">
    <div class="row mb-2">
        <div class="col">
        <input
            type="text"
            name="nombre"
            class="form-control"
            placeholder="Nombre"
            required
        />
        </div>
        <div class="col">
        <input
            type="text"
            name="apellido"
            class="form-control"
            placeholder="Apellido"
            required
        />
        </div>
    </div>


    <div class="mb-2">
        <input
        type="number"
        name="edad"
        class="form-control"
        placeholder="Edad"
        required
        />
    </div>


    <label class="form-label">Sexo</label>
    <div class="mb-2">
        <label class="me-2"
        ><input type="radio" name="sexo" value="Mujer" required /> Mujer</label
        >
        <label class="me-2"
        ><input type="radio" name="sexo" value="Hombre" /> Hombre</label
        >
        <label><input type="radio" name="sexo" value="Otro" /> Otro</label>
    </div>

    <div class="mb-2">
        <label class="form-label">Nivel de actividad física</label>
        <select name="actividad" class="form-select">
        <option value="Sedentario">Sedentario</option>
        <option value="Ligera">Actividad ligera</option>
        <option value="Moderada">Actividad moderada</option>
        <option value="Intensa">Actividad intensa</option>
        <option value="Muy intensa">Actividad muy intensa</option>
        </select>
    </div>

    <div class="mb-2">
        <label class="form-label">Nivel de experiencia</label>
        <select name="experiencia" class="form-select">
        <option value="Principiante">Principiante</option>
        <option value="Intermedio">Intermedio</option>
        <option value="Avanzado">Avanzado</option>
        </select>
    </div>

    <div class="mb-2">
        <label class="form-label">Objetivo</label>
        <select name="objetivo" class="form-select">
        <option value="Perder peso">Perder peso</option>
        <option value="Ganar masa">Ganar masa muscular</option>
        <option value="Mantener">Mantener peso</option>
        <option value="Mejorar salud">Mejorar salud</option>
        </select>
    </div>

    <div class="mb-2">
        <label class="form-label">Preferencias / Restricciones</label>
        <div>
        <label
            ><input type="checkbox" name="restricciones" value="Sin gluten" /> Sin
            gluten</label
        ><br />
        <label
            ><input type="checkbox" name="restricciones" value="Sin lactosa" />
            Sin lactosa</label
        ><br />
        <label
            ><input type="checkbox" name="restricciones" value="Vegetariano" />
            Vegetariano</label
        ><br />
        <label
            ><input type="checkbox" name="restricciones" value="Vegano" />
            Vegano</label
        ><br />
        <label
            ><input type="checkbox" name="restricciones" value="Ninguna" />
            Ninguna</label
        >
        </div>
    </div>

    <div class="mb-2">
        <input
        type="number"
        name="peso"
        class="form-control"
        placeholder="Peso en kg"
        required
        />
    </div>

    <div class="mb-2">
        <input
        type="number"
        name="altura"
        class="form-control"
        placeholder="Altura en cm"
        required
        />
    </div>

    <div class="mb-2">
        <input
        type="email"
        name="email"
        class="form-control"
        placeholder="Correo electrónico"
        required
        />
    </div>

    <div class="mb-3">
        <input
        type="password"
        name="password"
        class="form-control"
        placeholder="Contraseña nueva"
        required
        />
    </div>

    <p class="text-secondary small">
        Al registrarte aceptas nuestras Condiciones y la Política de privacidad.
    </p>

    <div class="text-center mb-2">
        <button type="submit" class="btn btn-success">Registrarte</button>
    </div>

    <div class="text-center">
        <a href="{{ url_for('sesion') }}">¿Ya tienes cuenta?</a>
    </div>
    </form>
</main>
{% endblock contenido %}
